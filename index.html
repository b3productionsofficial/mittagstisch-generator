<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Mittagstisch Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600;700&family=Raleway:wght@500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f4f4;
    }

    select, input, button, textarea {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    select {
      min-width: 420px;
    }

    input[type="text"] {
      min-width: 396px;
    }

    .preisfeld {
      min-width: 170px !important;
    }

    textarea {
      width: 100%;
      max-width: 700px;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Mittagstisch Generator</h2>

  Woche<br />
  <input id="woche" value="18.02. - 20.02.2026" />

  <br /><br />

  Dienstag<br>
  <input type="text" id="suche-dienstag" placeholder="Gericht suchen..." oninput="filterDropdown('dienstag', 'suche-dienstag')">
  <select id="dienstag" onchange="setPreisFeld('dienstag', 'preis-dienstag')"></select>
  <input class="preisfeld" type="text" id="preis-dienstag" placeholder="Preis">

  <br><br>

  Mittwoch<br>
  <input type="text" id="suche-mittwoch" placeholder="Gericht suchen..." oninput="filterDropdown('mittwoch', 'suche-mittwoch')">
  <select id="mittwoch" onchange="setPreisFeld('mittwoch', 'preis-mittwoch')"></select>
  <input class="preisfeld" type="text" id="preis-mittwoch" placeholder="Preis">

  <br><br>

  Donnerstag<br>
  <input type="text" id="suche-donnerstag" placeholder="Gericht suchen..." oninput="filterDropdown('donnerstag', 'suche-donnerstag')">
  <select id="donnerstag" onchange="setPreisFeld('donnerstag', 'preis-donnerstag')"></select>
  <input class="preisfeld" type="text" id="preis-donnerstag" placeholder="Preis">

  <br><br>

  Freitag<br>
  <input type="text" id="suche-freitag" placeholder="Gericht suchen..." oninput="filterDropdown('freitag', 'suche-freitag')">
  <select id="freitag" onchange="setPreisFeld('freitag', 'preis-freitag')"></select>
  <input class="preisfeld" type="text" id="preis-freitag" placeholder="Preis">

  <br><br>

  <button onclick="generate()">Bild erstellen</button>
  <a id="download" style="margin-left:20px;">Bild herunterladen</a>

  <br><br>

  <h3>Instagram Text</h3>
  <textarea id="caption" rows="10"></textarea>

  <br>

  <button onclick="copyCaption()">Text kopieren</button>

  <p id="status" style="margin-top:15px; color:#b00020; font-weight:bold;"></p>

  <canvas id="canvas" width="2160" height="2700"></canvas>

  <script src="script.js"></script>
</body>
</html>
